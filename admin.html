<!DOCTYPE html>
<html>
<head>
    <title>Admin - Add Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div id="login-section" class="max-w-md mx-auto mt-20 bg-white p-8 rounded shadow">
        <h2 class="text-xl font-bold mb-4 text-center">Admin Login</h2>
        <input id="pass" type="password" placeholder="Enter Password" class="w-full border p-2 mb-4">
        <button onclick="checkPass()" class="w-full bg-black text-white p-2 rounded">Enter</button>
    </div>

    <div id="admin-panel" class="hidden max-w-md mx-auto bg-white p-8 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Add New Item</h2>
        <p class="text-sm text-gray-500">Bhai, filhal yahan details bharke 'Save' kar sakte ho.</p>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('pass').value;
            if(pass === "bh4shivam") { // Apna password yahan set kar
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else { alert("Wrong Password!"); }
        }
    </script>
</body>
</html>
